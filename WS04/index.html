<!DOCTYPE html>
    <html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Development Website</title>
        <link rel="stylesheet" href="style.css">
        <style>
            header {
                background-color:aquamarine;
                padding:50px;
            }

            .värilaatikko {
                padding:30px;
                margin:100px 100px;
                background-color:darkgray;
                text-align:center;
            }

            @media (max-width:480px) {
                .värilaatikko {
                    background-color:cornflowerblue;
                }
            }

            @media (min-width:769px) {
                .värilaatikko {
                    background-color:gold;
                }
            }

            main {
                background-color:aliceblue;
                color:darkslateblue;
            }

            .ruudukko {
                display:grid;
                grid-template-columns:repeat(3, 1fr);
                grid-gap:20px;
                background-color:greenyellow;
            }

            .ruutu {
                background-color:darkseagreen;
                padding:40px;
                text-align:center;
                font-size:20px;
                margin:10px;
            }

        </style>
    </head>
    <body>
        <header>
            <h1>Sivun otsikko</h1>
            <br>
            <nav>
                <ul>
                    <li><a href="#tietoja">Tietoja</a></li>
                    <li><a href="#palvelut">Palvelut</a></li>
                    <li><a href="#yhteystiedot">Yhteystiedot</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="tietoja">
                <h2>Tietoja sivusta</h2>
                <p>Tähän tulisi tietoja sivusta.</p>
                </section>
                <br>
                <div class="ruudukko">
                    <div class="ruutu">1</div>
                    <div class="ruutu">2</div>
                    <div class="ruutu">3</div>
                    <div class="ruutu">4</div>
                    <div class="ruutu">5</div>
                    <div class="ruutu">6</div>
                </div>



                <div class="värilaatikko">Vaihtaa väriä näytön koon perusteella</div>
        </main>
        <footer>


        </footer>


    </body>
