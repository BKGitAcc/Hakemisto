<!DOCTYPE html>
    <html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Development Website</title>
        <link rel="stylesheet" href="style.css">
        <style>
            header {
                background-color:cornflowerblue;
                padding:50px;
                color:darkslateblue;
            }
            .värilaatikko {
                padding:30px;
                margin:50px 200px;
                background-color:darkgray;
                text-align:center;
            }
            @media (max-width:480px) {
                .värilaatikko {
                    background-color:cornflowerblue;
                }
            }
            @media (min-width:769px) {
                .värilaatikko {
                    background-color:gold;
                }
            }
            main {
                background-color:lightsteelblue;
                color:darkslateblue;
                text-align:center;
                padding:20px;
            }
            .ruudukko {
                display:grid;
                grid-template-columns:repeat(3, 1fr);
                grid-gap:20px;
                background-color:greenyellow;
            }
            .ruutu {
                background-color:darkseagreen;
                padding:40px;
                text-align:center;
                font-size:20px;
                margin:10px;
            }
            .flex {
                display:flex;
                justify-content:space-around;
                align-items:center;
                padding:30px;
            }
            .laatikko {
                background-color:lightseagreen;
                padding:40px;
            }
            footer {
                color:darkslateblue;
                background-color:cornflowerblue;
                padding:20px;
            }
            #palvelut {
                background-color:skyblue;
                color:darkslateblue;
                text-align:center;
                padding:20px;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Sivun otsikko</h1>
            <br>
            <nav>
                <ul>
                    <li><a href="#tietoja">Tietoja</a></li>
                    <li><a href="#palvelut">Palvelut</a></li>
                    <li><a href="#yhteystiedot">Yhteystiedot</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="tietoja">
                <h2>Tietoja sivusta</h2>
                <p>Tähän tulisi tietoja sivusta.</p>
                </section>
                <br>
                <div class="ruudukko">
                    <div class="ruutu">1</div>
                    <div class="ruutu">2</div>
                    <div class="ruutu">3</div>
                    <div class="ruutu">4</div>
                    <div class="ruutu">5</div>
                    <div class="ruutu">6</div>
                </div>
                <br>
        </main>
        <section id="palvelut">
            <h3>Sivun osio</h3>
               <div class="flex">
                    <div class="laatikko">A</div>
                    <div class="laatikko">B</div>
                    <div class="laatikko">C</div>
                </div>
                <br>
                <div class="värilaatikko">Tämä laatikko vaihtaa väriä näytön koon perusteella.</div>
                <br>
        </section>
        <footer>
            <section id="yhteystiedot">
            <h4>Yhteystiedot:</h3>
            <ul>
                <li>-</li>
                <li>-</li>
                <li>-</li>
            </ul>
            </section>
        </footer>
    </body>
    </html>
