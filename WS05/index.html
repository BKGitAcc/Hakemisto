<!DOCTYPE html>
    <html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Development Website</title>
        <style>

            body {
                background-color:lavender;
            }

            .menu {
                color:darkgreen;
                background-color:aquamarine;
            }

            .asettelu {
                display:flex;
                flex-wrap:wrap;
                background-color: cadetblue;
                justify-content: space-between;
            }

            .sarake {
                flex:1;
                color:darkgreen;
               background-color:aquamarine;
               margin:10%;
            }

            @media (max-width:480px) {
                .sarake {
                    flex:100%;
                }
            }

            .kuva {
                max-width:50%;
                height:auto;
                margin:10%;
            }

            .värilaatikko {
                background-color: blueviolet;
                color:cornflowerblue;
                margin:10%;
                padding:30%;
                font-size:200%;
            }

            @media (max-width:480px) {
                .värilaatikko {
                    background-color:darkseagreen;
                }
            }

            @media (min-width:481px) and (max-width:700px) {
                .värilaatikko {
                    background-color:khaki;
                }
            }

            .navigaatio .lista {
                display:flex;
            }

            .navigaatio {
                background-color:cornflowerblue;
                padding:10%;
            }
            
            .lista {
                justify-content:space-evenly;
            }

            @media (max-width:480px) {
                .navigaatio .lista {
                    display:none;
                }
                .navigaatio .menu {
                    display:block;
                }
            }

        </style>

    <body>

            <div class="asettelu">
                <div class="sarake">Sarake1</div>
                <div class="sarake">Sarake2</div>
            </div>

            <br>

            <img src="../Images/IMG_0411.jpg" alt="Kuva" class="kuva">

            <br>

            <div class="värilaatikko">Laatikko.</div>

            <br>

            <nav class="navigaatio">
                <button class="menu">Menu</button>
                <ul class="lista">
                    <li><a href="#">Etusivu</a></li>
                    <li><a href="#">Tietoja</a></li>
                    <li><a href="#">Yhteystiedot</a></li>
                </ul>
            </nav>

    </body>
